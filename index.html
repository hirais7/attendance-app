<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出退勤打刻アプリ | Attendance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="icon">⏱️</span>
                <h1>Attendance</h1>
            </div>
            <div class="date-display" id="date-display">2025/10/05</div>
        </header>

        <main>
            <section class="status-card">
                <div class="time-display" id="time-display">09:00:00</div>

                <div class="user-selection">
                    <div class="input-group-inline">
                        <label for="main-trainee-id">研修生ID</label>
                        <input type="text" id="main-trainee-id" placeholder="user01">
                    </div>
                    <div class="input-group-inline">
                        <label for="main-trainee-name">氏名</label>
                        <input type="text" id="main-trainee-name" placeholder="あなたの名前">
                    </div>
                </div>

                <div class="status-badge" id="work-status">準備完了</div>
            </section>

            <section class="actions">
                <button id="btn-clock-in" class="btn btn-primary">
                    <span class="btn-icon">☀️</span>
                    <span class="btn-text">出勤</span>
                </button>
                <button id="btn-clock-out" class="btn btn-secondary" disabled>
                    <span class="btn-icon">🌙</span>
                    <span class="btn-text">退勤</span>
                </button>
            </section>

            <section class="bottom-actions">
                <button id="btn-complete" class="btn btn-outline">
                    <span class="btn-icon">🎉</span>
                    <span class="btn-text">課題完了報告</span>
                </button>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Attendance App Training</p>
        </footer>
    </div>

    <!-- Registration Modal -->
    <div id="modal-registration" class="overlay hidden">
        <div class="modal">
            <h2>プロフィール設定</h2>
            <p>研修生情報を入力してください</p>
            <div class="input-group">
                <label for="input-trainee-id">研修生ID</label>
                <input type="text" id="input-trainee-id" placeholder="user01" value="user01">
            </div>
            <div class="input-group">
                <label for="input-trainee-name">氏名</label>
                <input type="text" id="input-trainee-name" placeholder="田中 太郎">
            </div>
            <button id="btn-save-user" class="btn btn-primary">保存して開始</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Loading Overlay -->
    <div id="loading" class="overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed!', err));
            });
        }
    </script>
</body>

</html>
